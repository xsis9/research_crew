collect_task:
  description: >
    采集竞品原始数据。根据 competitors 列表进行信息收集：

    1. 如果 competitors 非空，逐个收集每个竞品的信息
    2. 如果 competitors 为空，先根据 industry 发现主要竞品，再进行收集

    采集内容包括：
    - 产品基本信息（名称、官网、定位、目标用户）
    - 核心功能列表及详细描述
    - 定价策略和价格信息
    - 市场表现和用户评价
    - 技术架构和创新点
    - 最新动态和战略动向

    每条信息必须标注来源（URL、标题、采集时间）。
    使用 SourceTracker 工具记录所有来源。

    输入参数：
    - competitors: {competitors}
    - industry: {industry}
  expected_output: >
    结构化的竞品原始数据，包含每个竞品的完整信息，
    每条数据都标注了来源 ID。格式示例：
    {
      "competitors": ["产品A", "产品B"],
      "collected_data": [
        {
          "competitor": "产品A",
          "category": "product",
          "content": "产品定位描述",
          "source_id": "src_001"
        },
        ...
      ],
      "sources": {
        "src_001": {"url": "...", "title": "...", "collected_at": "..."}
      }
    }
  agent: collector

analyze_task:
  description: >
    分析采集的原始数据，进行结构化处理。

    基于竞品知识 Schema，对收集的信息进行：
    1. 产品画像整理
    2. 功能对比分析
    3. 定价策略分析
    4. 市场定位分析
    5. SWOT 分析提取

    输入参数：
    - competitors: {competitors}
    - industry: {industry}

    每个分析结论必须：
    - 明确标注置信度 (0-1)
    - 关联来源 ID 列表
    - 标注分析类别 (product/feature/pricing/market/tech)

    对于重要结论，进行交叉验证，确保信息来源可靠。
  expected_output: >
    结构化分析结果，包含：
    - products: 产品画像列表
    - feature_comparisons: 功能对比列表
    - pricing_strategies: 定价策略列表
    - market_analyses: 市场分析列表
    - swot: SWOT 分析结果
    - findings: 所有分析结论（带来源和置信度）
    - traceability_log: 分析过程记录
  agent: analyzer
  context:
    - collect_task

write_task:
  description: >
    撰写完整的竞品分析报告。

    输入参数：
    - competitors: {competitors}
    - industry: {industry}

    根据分析结果，撰写结构化报告，包括：
    1. 执行摘要：关键发现和结论
    2. 产品画像：各竞品的基本信息
    3. 功能对比：核心功能横向比较表格
    4. 定价分析：定价策略和价格对比
    5. 市场分析：市场份额和用户评价
    6. 技术分析：技术架构和创新点
    7. SWOT 分析：各竞品的优劣势机会威胁
    8. 结论与建议：总结和战略建议

    重要：每个分析结论都必须标注来源，使用 [source: src_XXX] 格式。
    报告输出到 output/competitive_report.md
  expected_output: >
    完整的竞品分析 Markdown 报告，包含：
    - 清晰的章节结构
    - 每个结论的来源标注
    - 可读的表格和图表（ASCII）
    - 专业的分析结论
    - 输出到 output/competitive_report.md
  agent: writer
  context:
    - analyze_task
  output_file: output/competitive_report.md

qa_task:
  description: >
    质检竞品分析报告。

    审查报告的以下方面：
    1. 完整性：是否覆盖了产品、功能、定价、市场、技术、SWOT 等维度
    2. 溯源性：每个结论是否都有来源标注，来源是否可靠
    3. 准确性：数据是否经过交叉验证，逻辑是否严密
    4. 可读性：报告结构是否清晰，表达是否专业

    检查完成后，输出审查结果：
    - approved: true/false
    - feedback: 具体修改意见（如果不批准）
    - quality_score: 1-10 的质量评分
  expected_output: >
    质检报告，包含：
    - approved: 是否批准 (true/false)
    - quality_score: 质量评分 (1-10)
    - feedback: 修改意见（如果不批准）
    - issues: 发现的问题列表
    - strengths: 报告的优点列表
  agent: qa
  context:
    - write_task

revise_task:
  description: >
    根据 QA 反馈修订报告。

    如果 QA 未批准（approved: false），根据 QA 的具体反馈意见，
    对报告进行修订：
    1. 补充缺失的信息
    2. 加强来源标注
    3. 修正不准确的数据
    4. 改善报告结构

    修订完成后，重新提交给 QA 审查。

    最多进行 3 次修订循环。
  expected_output: >
    修订后的报告，包含：
    - 修改内容说明
    - 修订版本号
    - 重新输出到 output/competitive_report.md
    - 如果达到最大修订次数仍未通过，输出最终版本并说明原因
  agent: writer
  context:
    - qa_task